<div class="app-container calender-screen">
  <app-app-header />
  <div class="calender-screen__body" *ngIf="!showComparison">
    <div class="calender-screen__body__date">
      <a class="calender-screen__body__date__prev" (click)="prevMonth()">
        <svg
          width="36"
          height="36"
          viewBox="0 0 36 36"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M20.5 23L15.5 18L20.5 13"
            stroke="#77767A"
            stroke-width="1.66667"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <p>{{ currentMonth + '&nbsp; ' + currentYear }}</p>
      <a class="calender-screen__body__date__next" (click)="nextMonth()">
        <svg
          width="36"
          height="36"
          viewBox="0 0 36 36"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M15.5 23L20.5 18L15.5 13"
            stroke="#77767A"
            stroke-width="1.66667"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>
    <div class="calender-screen__body__row">
      <input
        type="month"
        [(ngModel)]="selectedDate"
        class="calender-screen__body__input"
        [value]="selectedDate"
      />
      <a class="calender-screen__body__row__today" (click)="goToToday()">Today</a>
    </div>
    <div class="calender-screen__body__calender">
      <p class="calender-screen__body__calender__title">Let’s record your data everyday!</p>
      <div class="calender-screen__body__calender__body">
        <div class="days">
          <div
            class="day-header"
            *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']"
          >
            {{ day }}
          </div>
        </div>
        <div *ngFor="let week of generateCalendar()" class="week">
          <div *ngFor="let day of week" class="day" [class.empty]="day === null">
            <p class="day__number">{{ day }}</p>
            <div *ngIf="day !== null && day < 3" class="day__period">
              <svg
                width="16"
                height="17"
                viewBox="0 0 16 17"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="M0 0L15.9706 17L16 0H0Z" fill="#FF0000" />
              </svg>
            </div>
            <div class="day__weight" *ngIf="day !== null && day % 2 === 0">71 kg</div>
            <div class="day__bodyFat" *ngIf="day !== null && day % 2 !== 0">25.1%</div>
            <div class="day__fatWeight" *ngIf="day !== null">12 kg</div>
